<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sombrero Seleccionador</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Spectral:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Spectral', serif;
      background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
      color: #f7e1b5;
      text-align: center;
      padding: 50px 20px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 { 
      font-family: 'Cinzel', serif; 
      font-size: 3em; 
      margin-bottom: 30px; 
      text-shadow: 0 0 10px rgba(247, 225, 181, 0.5);
      letter-spacing: 2px;
    }

    .mute-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #3e2723;
      border: 2px solid #d4af37;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
      font-size: 1.5em;
      color: #d4af37;
      transition: all 0.3s;
      z-index: 1000;
    }
    .mute-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    /* Contenedor tipo pergamino */
    .container {
      background: #f4e4bc;
      background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 100px rgba(139, 69, 19, 0.2);
      max-width: 600px;
      width: 90%;
      color: #3e2723;
      border: 8px double #8b4513;
      position: relative;
    }

    #pregunta { 
      font-size: 1.8em; 
      margin: 40px 0; 
      font-weight: 700;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .botones { margin: 30px 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
    
    button {
      font-family: 'Cinzel', serif;
      font-size: 1.1em;
      padding: 12px 30px;
      border: 2px solid #3e2723;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      font-weight: bold;
    }

    .btn-si { background: #2f5233; color: white; border-color: #1a2f1c; }
    .btn-no { background: #7b1d1d; color: white; border-color: #4b0b0b; }
    .btn-iniciar, .btn-reiniciar { background: #8b4513; color: white; padding: 15px 50px; }

    button:hover { 
      transform: scale(1.1); 
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      filter: brightness(1.2);
    }

    /* Barra de Progreso */
    .progress-container {
      width: 100%;
      background: rgba(0,0,0,0.1);
      height: 10px;
      border-radius: 5px;
      margin-top: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #8b4513;
      width: 0%;
      transition: width 0.5s ease;
    }

    #resultado { 
      font-size: 2.2em; 
      margin-top: 30px; 
      font-weight: bold; 
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
    }
    
    .character-info {
      margin-top: 20px;
      display: none;
      animation: fadeIn 1s ease;
    }

    .character-info img {
      width: 150px;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      border: 4px solid gold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }

    /* Casas */
    .gryffindor { color: #740001; background: #ae0001; border: 5px solid #d4af37; padding: 25px; border-radius: 10px; color: #fff; box-shadow: 0 0 20px #d4af37; }
    .slytherin { color: #1a472a; background: #2a623d; border: 5px solid #aaaaaa; padding: 25px; border-radius: 10px; color: #fff; box-shadow: 0 0 20px #aaaaaa; }
    .ravenclaw { color: #0e1a40; background: #222f5b; border: 5px solid #946b2d; padding: 25px; border-radius: 10px; color: #fff; box-shadow: 0 0 20px #946b2d; }
    .hufflepuff { color: #372e29; background: #ecb939; border: 5px solid #372e29; padding: 25px; border-radius: 10px; color: #372e29; box-shadow: 0 0 20px #372e29; }
    .muggle { color: #eee; background: #333; padding: 25px; border-radius: 10px; border: 5px solid #888; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.6s ease forwards; }

  </style>
</head>
<body>
  <h1>🏠 Sombrero Seleccionador</h1>
  <button id="muteBtn" class="mute-btn" onclick="toggleMute()">🔊</button>
  
  <div class="container fade-in">
    <div id="inicio">
      <p style="font-size: 1.2em; margin-bottom: 25px;">Bienvenido, joven mago. Descubre a qué casa de Hogwarts perteneces realmente...</p>
      <button class="btn-iniciar" onclick="iniciar()">Entrar al Gran Comedor</button>
    </div>

    <div id="test" style="display:none;">
      <div class="progress-container">
        <div id="pb" class="progress-bar"></div>
      </div>
      <div id="pregunta"></div>
      <div class="botones">
        <button class="btn-si" onclick="responder('s')">Es mi sendero</button>
        <button class="btn-no" onclick="responder('n')">Para nada</button>
      </div>
    </div>

    <div id="resultado-container">
      <div id="resultado"></div>
      <div id="character" class="character-info">
        <div id="char-name" style="font-size: 0.8em; margin-bottom: 10px;"></div>
        <img id="char-img" src="" alt="">
      </div>
      <div id="reiniciar" style="display:none; margin-top: 30px;">
        <button class="btn-reiniciar" onclick="reiniciarTest()">Regresar al Inicio</button>
      </div>
    </div>
  </div>

  <script>
    var preguntas = [
      "1. ¿Eres valiente?",
      "2. ¿Eres temerario?",
      "3. ¿Eres ambicioso?",
      "4. ¿Eres astuto?",
      "5. ¿Eres inteligente?",
      "6. ¿Eres curioso?",
      "7. ¿Eres leal?",
      "8. ¿Eres trabajador?"
    ];
    
    var preguntasTexto = [
      "valiente",
      "temerario",
      "ambicioso",
      "astuto",
      "inteligente",
      "curioso",
      "leal",
      "trabajador"
    ];
    
    var reglas = [
      { casa: "Gryffindor", req: ["valiente", "temerario"], clase: "gryffindor" },
      { casa: "Slytherin", req: ["ambicioso", "astuto"], clase: "slytherin" },
      { casa: "Ravenclaw", req: ["inteligente", "curioso"], clase: "ravenclaw" },
      { casa: "Hufflepuff", req: ["leal", "trabajador"], clase: "hufflepuff" }
    ];
    
    var nombres = ["valiente", "temerario", "ambicioso", "astuto", "inteligente", "curioso", "leal", "trabajador"];
    var respuestas = [];
    var actual = 0;
    var muteado = false;
    var bloqueado = false;
    var vozCache = null;
    
    if ('speechSynthesis' in window) {
      function cargarVoces() {
        var voces = speechSynthesis.getVoices();
        // Prioridad: Voces Neurales masculinas -> Cualquier voz masculina -> Cualquier voz neural -> Fallback
        vozCache = voces.find(function(v) { 
          return v.lang.includes('es') && (v.name.includes('Natural') || v.name.includes('Neural')) && (v.name.includes('Alvaro') || v.name.includes('Castilla') || v.name.includes('Male') || v.name.includes('Hombre')); 
        }) || voces.find(function(v) { 
          return v.lang.includes('es') && (v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('hombre') || v.name.toLowerCase().includes('alvaro')); 
        }) || voces.find(function(v) { 
          return v.lang.includes('es') && (v.name.includes('Natural') || v.name.includes('Neural')); 
        }) || voces.find(function(v) { 
          return v.lang.includes('es'); 
        });
      }
      speechSynthesis.onvoiceschanged = cargarVoces;
      cargarVoces();
    }
    
    function toggleMute() {
      muteado = !muteado;
      document.getElementById('muteBtn').textContent = muteado ? '🔇' : '🔊';
      if (muteado) window.speechSynthesis.cancel();
    }
    
    function hablar(texto, callback) {
      if (muteado) {
        if (callback) callback();
        return;
      }
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        
        if (vozCache) {
          utterance.voice = vozCache;
          // Forzamos un pitch muy bajo para lograr la voz "gruesa" de mago/sombrero
          var esNatural = vozCache.name.includes('Natural') || vozCache.name.includes('Neural');
          utterance.rate = esNatural ? 0.75 : 0.8; // Un poco más lento para enfatizar la gravedad
          utterance.pitch = 0.35; // Pitch muy bajo para voz gruesa (el rango es 0 a 2)
        } else {
          utterance.rate = 0.75;
          utterance.pitch = 0.35;
        }

        utterance.onend = function() {
          if (callback) callback();
        };

        // Fallback por si onend no dispara (común en algunos navegadores)
        var forzarCallback = setTimeout(function() {
          if (callback) {
            callback();
            callback = null;
          }
        }, texto.length * 150); // Estimación de tiempo por caracteres

        window.speechSynthesis.speak(utterance);
      } else {
        if (callback) callback();
      }
    }
    
    function bloquearBotones(duracion) {
      bloqueado = true;
      document.querySelector('.btn-si').disabled = true;
      document.querySelector('.btn-no').disabled = true;
      document.querySelector('.btn-si').style.opacity = '0.5';
      document.querySelector('.btn-no').style.opacity = '0.5';
      
      // El bloqueo ahora dura lo que tarde el audio o 3s de seguridad
      var tiempo = duracion || 3000;
      setTimeout(function() {
        bloqueado = false;
        document.querySelector('.btn-si').disabled = false;
        document.querySelector('.btn-no').disabled = false;
        document.querySelector('.btn-si').style.opacity = '1';
        document.querySelector('.btn-no').style.opacity = '1';
      }, tiempo);
    }
    
    function iniciar() {
      document.getElementById('inicio').style.display = 'none';
      document.getElementById('test').style.display = 'block';
      hablar("Bienvenido, joven mago. Descubre a qué casa de Hogwarts perteneces.", function() {
        setTimeout(mostrarPregunta, 500);
      });
      bloquearBotones(4000);
    }
    
    function mostrarPregunta() {
      var p = document.getElementById('pregunta');
      p.innerText = preguntas[actual];
      p.className = 'fade-in';
      setTimeout(() => { p.className = ''; }, 600);
      
      var porc = (actual / preguntas.length) * 100;
      document.getElementById('pb').style.width = porc + "%";
      
      var texto = "¿Dime, eres una persona " + preguntasTexto[actual] + "?";
      hablar(texto, function() {
        // Desbloqueo manual cuando termina el audio
        bloqueado = false;
        document.querySelector('.btn-si').disabled = false;
        document.querySelector('.btn-no').disabled = false;
        document.querySelector('.btn-si').style.opacity = '1';
        document.querySelector('.btn-no').style.opacity = '1';
      });
      bloquearBotones(2500); // Bloqueo mínimo preventivo
    }
    
    function responder(r) {
      if (bloqueado) return;
      if (r === 's') {
        respuestas.push(actual + 1);
      }
      actual++;
      if (actual < preguntas.length) {
        mostrarPregunta();
      } else {
        document.getElementById('pb').style.width = "100%";
        calcular();
      }
    }
    
    async function fetchCharacter(house) {
      if (house === 'muggle') return;
      try {
        const response = await fetch(`https://hp-api.onrender.com/api/characters/house/${house.toLowerCase()}`);
        const characters = await response.json();
        const withImg = characters.filter(c => c.image);
        if (withImg.length > 0) {
          const char = withImg[Math.floor(Math.random() * withImg.length)];
          document.getElementById('char-img').src = char.image;
          document.getElementById('char-name').innerText = `Tu mentor será: ${char.name}`;
          document.getElementById('character').style.display = 'block';
          if (!muteado) {
            setTimeout(function() {
              hablar("Tu mentor será: " + char.name);
            }, 1000);
          }
        }
      } catch (e) {
        console.log("No se pudo cargar el personaje", e);
      }
    }

    function calcular() {
      document.getElementById('test').style.display = 'none';
      var tiene = [];
      for (var i = 0; i < respuestas.length; i++) {
        tiene.push(nombres[respuestas[i] - 1]);
      }
      
      for (var j = 0; j < reglas.length; j++) {
        var r = reglas[j];
        var ok = true;
        for (var k = 0; k < r.req.length; k++) {
          if (tiene.indexOf(r.req[k]) === -1) {
            ok = false;
            break;
          }
        }
        if (ok) {
          var div = document.getElementById('resultado');
          div.innerHTML = "Tu casa es: " + r.casa;
          div.className = r.clase + " fade-in";
          document.getElementById('reiniciar').style.display = 'block';
          var textoResultado = r.casa + "! Una excelente elección!";
          hablar(textoResultado, function() {
            fetchCharacter(r.casa);
          });
          return;
        }
      }
      
      var div = document.getElementById('resultado');
      div.innerHTML = "Eres un Muggle";
      div.className = "muggle fade-in";
      document.getElementById('reiniciar').style.display = 'block';
      hablar("Eres un Muggle. Lo siento, no perteneces a ninguna casa.", function() {});
    }
    
    function reiniciarTest() {
      respuestas = [];
      actual = 0;
      document.getElementById('resultado').innerHTML = '';
      document.getElementById('resultado').className = '';
      document.getElementById('character').style.display = 'none';
      document.getElementById('reiniciar').style.display = 'none';
      document.getElementById('test').style.display = 'block';
      document.querySelector('.btn-si').disabled = false;
      document.querySelector('.btn-no').disabled = false;
      bloqueado = false;
      mostrarPregunta();
    }
  </script>
</body>
</html>
